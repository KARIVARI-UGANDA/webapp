name: Deploy to Render

on:
  push:
    branches: [main]

# Only deploy after CI passes
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    needs: []          # runs independently but only on push to main (CI must pass first via branch protection)

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -o /dev/null \
            -w "HTTP status: %{http_code}\n"

      - name: Wait for deploy to complete
        run: |
          echo "Deploy triggered. Monitor progress at https://dashboard.render.com"
          echo "Live URL: https://webapp-01os.onrender.com"
