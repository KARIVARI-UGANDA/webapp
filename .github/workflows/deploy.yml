name: Deploy to Render

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    # Only deploy when CI passed — not on failure or cancellation
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -o /dev/null \
            -w "HTTP status: %{http_code}\n"

      - name: Deploy triggered
        run: |
          echo "Deploy triggered. Monitor progress at https://dashboard.render.com"
          echo "Live URL: https://webapp-01os.onrender.com"
