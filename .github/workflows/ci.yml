name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Lint & format check ────────────────────────────────────────────────
  lint:
    name: Lint & format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install ruff

      - name: Check code style
        run: ruff check app/ tests/ --output-format=github

      - name: Check code formatting
        run: ruff format --check app/ tests/

  # ── 2. Security scan ──────────────────────────────────────────────────────
  security:
    name: Security scan (bandit + safety)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install bandit safety

      - name: Bandit — static security analysis
        run: bandit -r app/ -ll --exit-zero

      - name: Safety — known vulnerability check
        run: safety check --file requirements.txt --ignore 70612 || true

  # ── 3. Tests with coverage ────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Run tests with coverage
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: ci-test-secret-key-32-chars-long!
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          REFRESH_TOKEN_EXPIRE_DAYS: "14"
          RESEND_API_KEY: ""
          SMTP_HOST: ""
          SMTP_USERNAME: ""
          SMTP_PASSWORD: ""
          SMTP_PORT: "587"
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --junitxml=test-results.xml \
            -v

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: test-results.xml
          retention-days: 7

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7

      - name: Coverage summary (fail below 50%)
        run: |
          python - <<'EOF'
          import xml.etree.ElementTree as ET
          tree = ET.parse("coverage.xml")
          rate = float(tree.getroot().attrib["line-rate"]) * 100
          print(f"Coverage: {rate:.1f}%")
          if rate < 50:
              raise SystemExit(f"Coverage {rate:.1f}% is below 50% threshold")
          EOF

      - name: Annotate test failures on PR
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: test-results.xml
          check_name: Test Results (Python ${{ matrix.python-version }})
          fail_on_failure: true
