name: Release

on:
  push:
    tags:
      - "v*.*.*"   # triggers on tags like v1.0.0, v2.3.1

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can generate a changelog

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Run tests before releasing
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: ci-test-secret-key-32-chars-long!
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          REFRESH_TOKEN_EXPIRE_DAYS: "14"
          RESEND_API_KEY: ""
          SMTP_HOST: ""
          SMTP_USERNAME: ""
          SMTP_PASSWORD: ""
          SMTP_PORT: "587"
        run: pytest tests/ -q

      - name: Generate changelog from git log
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          CURRENT_TAG=${GITHUB_REF_NAME}
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" "$CURRENT_TAG")
          else
            LOG=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG".."$CURRENT_TAG")
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Kari Vari Uganda ${{ github.ref_name }}"
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.CHANGELOG }}

            ---
            🌿 **Live app**: https://webapp-01os.onrender.com
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
