name: Release

on:
  push:
    tags:
      - "v*.*.*"   # triggers on v1.0.0, v1.1.0-beta, v2.3.1-rc1

permissions:
  contents: write   # create GitHub Releases
  packages: write   # push Docker image to GHCR

jobs:
  release:
    name: Test, Release & Publish Docker Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog

      # ── Python tests ──────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Run tests before releasing
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: ci-test-secret-key-32-chars-long!
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "30"
          REFRESH_TOKEN_EXPIRE_DAYS: "14"
          RESEND_API_KEY: ""
          SMTP_HOST: ""
          SMTP_USERNAME: ""
          SMTP_PASSWORD: ""
          SMTP_PORT: "587"
        run: pytest tests/ -q

      # ── Changelog ─────────────────────────────────────────────────────────────
      - name: Generate changelog from git log
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          CURRENT_TAG=${GITHUB_REF_NAME}
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" "$CURRENT_TAG")
          else
            LOG=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG".."$CURRENT_TAG")
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Kari Vari Uganda ${{ github.ref_name }}"
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.CHANGELOG }}

            ---
            🌿 **Live app**: https://webapp-01os.onrender.com
            🐳 **Docker**: `docker pull ghcr.io/karivari-uganda/webapp:${{ github.ref_name }}`
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          files: requirements.txt

      # ── Docker image → GHCR ───────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.RENTAL }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/karivari-uganda/webapp
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-beta') && !contains(github.ref_name, '-rc') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
