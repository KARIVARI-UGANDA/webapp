[lint]
select = ["E", "F", "W", "I"]
ignore = [
  "E501",   # line too long — handled by formatter
  "F401",   # unused import — some are re-exports
  "E712",   # == True / == False needed for SQLAlchemy filter expressions
]
exclude = ["venv", ".venv", "migrations"]

[lint.per-file-ignores]
"app/database.py" = ["E402"]   # imports after sys.path.insert are intentional
