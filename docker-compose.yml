services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Non-secret defaults — override in .env if needed
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-14}
      HOST: "0.0.0.0"
      PORT: "8000"
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-usd}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@karivari.ug}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Kari Vari Uganda}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
