services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: karivari
      POSTGRES_PASSWORD: karivari_local
      POSTGRES_DB: karivari
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karivari"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://karivari:karivari_local@db:5432/karivari
      SECRET_KEY: change-this-to-a-random-32-char-secret
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "14"
      HOST: "0.0.0.0"
      PORT: "8000"
      # Payment providers — optional for local demo, leave blank to skip
      STRIPE_SECRET_KEY: ""
      STRIPE_PUBLISHABLE_KEY: ""
      STRIPE_CURRENCY: usd
      FLUTTERWAVE_SECRET_KEY: ""
      FLUTTERWAVE_PUBLIC_KEY: ""
      PAYSTACK_SECRET_KEY: ""
      PAYSTACK_PUBLIC_KEY: ""
      # Email — optional for local demo, leave blank to skip sending
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      SMTP_FROM_EMAIL: noreply@karivari.ug
      SMTP_FROM_NAME: Kari Vari Uganda
      SMTP_USE_TLS: "true"
      RESEND_API_KEY: ""
      APP_BASE_URL: http://localhost:8000
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
