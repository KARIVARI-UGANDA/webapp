<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owner Register — Karivari Uganda</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body class="auth-page auth-owner d-flex align-items-center justify-content-center min-vh-100 py-5">
<div class="auth-card card shadow p-4 p-md-5">
  <a href="/" class="text-decoration-none mb-2 d-inline-block">
    <span class="fw-bold fs-5" style="color:#2d5a27">Karivari Uganda</span>
  </a>
  <div class="auth-role-badge auth-role-owner mb-3">
    <i class="bi bi-car-front-fill me-1"></i> Vehicle Owner Portal
  </div>
  <h4 class="mb-1 fw-bold">Join as a Vehicle Owner</h4>
  <p class="text-secondary small mb-4">List your vehicles and earn with Karivari</p>
  <div id="ownerRegisterAlert" class="alert d-none" role="alert"></div>
  <form id="registerOwnerForm" method="post">
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" name="full_name" class="form-control" placeholder="John Doe" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Email address</label>
      <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Phone Number</label>
      <input type="tel" name="phone_number" class="form-control" placeholder="+256 700 000000" required>
    </div>
    <div class="mb-4">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" minlength="8" required>
    </div>
    <button type="submit" class="btn btn-owner w-100 py-2 fw-bold">Create Owner Account</button>
  </form>
  <p class="mt-3 text-center small">Already have an account? <a href="/owner/login" class="text-decoration-none fw-semibold" style="color:#b45309">Sign In</a></p>
  <hr class="my-3 opacity-25">
  <p class="text-center small text-secondary mb-0">
    Looking to book a vehicle? <a href="/register" class="text-decoration-none">Customer Register</a> &nbsp;·&nbsp;
    <a href="/driver/register" class="text-decoration-none">Join as Driver</a>
  </p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/shared.js"></script>
<script src="/static/js/owner/register.js"></script>
</body>
</html>
