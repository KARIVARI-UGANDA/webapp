<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Karivari Uganda</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/index.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100 py-5">
<div class="card shadow-sm p-4" style="max-width:480px;width:100%">
  <a href="/" class="text-decoration-none mb-3 d-inline-block">
    <span class="fw-bold fs-5" style="color:#2d5a27">Karivari Uganda</span>
  </a>
  <h4 class="mb-4">Create an Account</h4>
  <form id="registerTravelerForm">
    <div class="mb-3">
      <label class="form-label">Full Name</label>
      <input type="text" name="full_name" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" name="email" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Phone Number</label>
      <input type="tel" name="phone_number" class="form-control" placeholder="+256 700 000000" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" minlength="8" required>
    </div>
    <div class="mb-3">
      <label class="form-label">I am a…</label>
      <select name="role" class="form-select">
        <option value="tourist">Tourist — I want to book a vehicle</option>
        <option value="owner">Car Owner — I want to list my vehicle</option>
        <option value="driver">Driver — I want to drive for tourists</option>
      </select>
    </div>
    <button type="submit" class="btn btn-primary w-100">Create Account</button>
  </form>
  <p class="mt-3 text-center small">Already have an account? <a href="/login">Sign In</a></p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
