<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driver Sign In — Karivari Uganda</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body class="auth-page auth-driver d-flex align-items-center justify-content-center min-vh-100">
<div class="auth-card card shadow p-4 p-md-5">
  <a href="/" class="text-decoration-none mb-2 d-inline-block">
    <span class="fw-bold fs-5" style="color:#2d5a27">Karivari Uganda</span>
  </a>
  <div class="auth-role-badge auth-role-driver mb-3">
    <i class="bi bi-person-badge-fill me-1"></i> Driver Portal
  </div>
  <h4 class="mb-1 fw-bold">Driver Sign In</h4>
  <p class="text-secondary small mb-4">Access your driver dashboard and trips</p>
  <div id="driverLoginAlert" class="alert d-none" role="alert"></div>
  <form id="driverLoginForm" method="post">
    <div class="mb-3">
      <label class="form-label">Email address</label>
      <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
    </div>
    <div class="mb-4">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-driver w-100 py-2 fw-bold">Sign In as Driver</button>
  </form>
  <p class="mt-3 text-center small">Don't have an account? <a href="/driver/register" class="text-decoration-none fw-semibold" style="color:#1d4ed8">Register as Driver</a></p>
  <hr class="my-3 opacity-25">
  <p class="text-center small text-secondary mb-0">
    Looking for <a href="/login" class="text-decoration-none">Customer Login</a> or
    <a href="/owner/login" class="text-decoration-none">Owner Login</a>?
  </p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/shared.js"></script>
<script src="/static/js/driver/login.js"></script>
</body>
</html>
