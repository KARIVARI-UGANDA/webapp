<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Training | Kari Vari Uganda</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/dashboard.css">
</head>
<body style="background:#f9f9fc;">

<div class="d-flex">
  <!-- Sidebar -->
  <nav class="sidebar d-flex flex-column p-3 gap-1 flex-shrink-0">
    <a class="navbar-brand text-white fw-bold fs-5 mb-4 px-2 d-flex align-items-center gap-2" href="/"><i class="bi bi-car-front-fill"></i> Kari Vari Uganda</a>
    <a class="nav-link" href="/driver/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a class="nav-link" href="/driver/trips"><i class="bi bi-map"></i> My Trips</a>
    <a class="nav-link active" href="/driver/training"><i class="bi bi-mortarboard"></i> Training</a>
    <a class="nav-link" href="#"><i class="bi bi-star"></i> Reviews</a>
    <a class="nav-link" href="/settings"><i class="bi bi-person-circle"></i> Profile</a>
    <a class="nav-link" href="/settings"><i class="bi bi-gear"></i> Settings</a>
    <div class="mt-auto pt-3 border-top border-white border-opacity-25">
      <a class="nav-link nav-link-danger" href="#" id="logoutBtn">
        <i class="bi bi-box-arrow-right"></i> Logout
      </a>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="flex-grow-1 p-4 p-lg-5">

    <!-- Header -->
    <div class="d-flex flex-wrap align-items-center justify-content-between mb-4 gap-3">
      <div>
        <span class="portal-badge portal-badge-driver mb-2 d-inline-block">DRIVER PORTAL</span>
        <h1 class="page-header mb-1">Training Modules</h1>
        <p class="text-secondary small mb-0">Complete all modules to become a verified Kari Vari driver.</p>
      </div>
      <div id="trainingBadgeWrap"></div>
    </div>

    <!-- Progress bar -->
    <div class="card border-0 rounded-4 shadow-sm p-4 mb-4">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <span class="fw-semibold small text-secondary">OVERALL PROGRESS</span>
        <span class="fw-bold" id="progressLabel">0 / 0</span>
      </div>
      <div class="progress rounded-pill" style="height:10px;">
        <div id="progressBar" class="progress-bar bg-success rounded-pill" style="width:0%;"></div>
      </div>
    </div>

    <!-- Module list -->
    <div class="card border-0 rounded-4 shadow-sm">
      <div class="card-body p-4" id="moduleList">
        <div class="text-center py-5 text-secondary">
          <div class="spinner-border spinner-border-sm me-2"></div>Loading modules…
        </div>
      </div>
    </div>

  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/shared.js"></script>
<script>
const API   = '/api';
const token = localStorage.getItem('access_token');
if (!token) { window.location.href = '/login'; }
document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); window.location.href = '/'; });

const AUTH = { headers: { Authorization: `Bearer ${token}` } };

let modules = [];

function renderModules() {
  const total     = modules.length;
  const completed = modules.filter(m => m.completed).length;
  const pct       = total ? Math.round((completed/total)*100) : 0;

  document.getElementById('progressLabel').textContent = `${completed} / ${total}`;
  document.getElementById('progressBar').style.width   = `${pct}%`;

  const allDone = total > 0 && completed === total;
  document.getElementById('trainingBadgeWrap').innerHTML = allDone
    ? `<span class="badge bg-success-subtle text-success-emphasis px-3 py-2 fs-6 rounded-pill"><i class="bi bi-patch-check-fill me-1"></i>All Complete</span>`
    : `<span class="badge bg-secondary-subtle text-secondary px-3 py-2 fs-6 rounded-pill">${pct}% complete</span>`;

  if (!total) {
    document.getElementById('moduleList').innerHTML = `
      <div class="text-center py-5 text-secondary">
        <i class="bi bi-mortarboard fs-1 opacity-25 d-block mb-3"></i>
        <p class="mb-0">No training modules available yet.</p>
      </div>`;
    return;
  }

  document.getElementById('moduleList').innerHTML = modules.map((m, idx) => {
    const done = m.completed;
    const icon = done
      ? `<div class="rounded-circle d-flex align-items-center justify-content-center" style="width:40px;height:40px;background:rgba(21,128,61,0.1);color:#15803d;flex-shrink:0;"><i class="bi bi-check-circle-fill"></i></div>`
      : `<div class="rounded-circle d-flex align-items-center justify-content-center fw-bold text-secondary" style="width:40px;height:40px;background:#e9ecef;flex-shrink:0;">${idx+1}</div>`;

    const completedAt = m.completed_at
      ? `<span class="text-success small"><i class="bi bi-check-circle me-1"></i>Completed ${new Date(m.completed_at).toLocaleDateString('en-UG',{day:'numeric',month:'short',year:'numeric'})}</span>`
      : '';

    const scoreTag = m.score != null ? `<span class="badge bg-primary-subtle text-primary rounded-pill ms-2">Score: ${m.score}</span>` : '';

    const contentBtn = m.content_url
      ? `<a href="${m.content_url}" target="_blank" class="btn btn-sm btn-outline-secondary rounded-3 me-2"><i class="bi bi-play-circle me-1"></i>View Material</a>`
      : '';

    const completeBtn = !done
      ? `<button class="btn btn-sm btn-success rounded-3 fw-semibold" onclick="markComplete('${m.id}',this)">
          <i class="bi bi-check-lg me-1"></i>Mark Complete
        </button>`
      : `<span class="text-success fw-semibold small"><i class="bi bi-patch-check-fill me-1"></i>Done${scoreTag}</span>`;

    return `
      <div class="d-flex gap-3 p-4 rounded-4 border mb-3 align-items-start" style="background:${done?'rgba(21,128,61,0.03)':'#fff'};">
        ${icon}
        <div class="flex-grow-1">
          <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-1">
            <h6 class="fw-semibold mb-0">${m.title}</h6>
            ${completedAt}
          </div>
          ${m.description ? `<p class="text-secondary small mb-2">${m.description}</p>` : ''}
          <div class="d-flex flex-wrap gap-2 mt-2">
            ${contentBtn}
            ${completeBtn}
          </div>
        </div>
      </div>`;
  }).join('');
}

async function markComplete(moduleId, btn) {
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Saving…';
  try {
    const res = await fetch(`${API}/drivers/me/training/${moduleId}/complete`, { method:'POST', ...AUTH });
    if (!res.ok) { const e=await res.json(); throw new Error(e.detail||'Failed'); }
    const data = await res.json();
    const m = modules.find(x => x.id === moduleId);
    if (m) { m.completed = true; m.completed_at = data.completed_at; }
    renderModules();
    if (data.training_fully_completed) {
      const wrap = document.getElementById('trainingBadgeWrap');
      wrap.innerHTML = `<span class="badge bg-success px-3 py-2 fs-6 rounded-pill"><i class="bi bi-trophy-fill me-1"></i>Training Complete!</span>`;
    }
  } catch(e) {
    alert(e.message);
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-check-lg me-1"></i>Mark Complete';
  }
}

async function load() {
  try {
    const res = await fetch(`${API}/drivers/me/training`, AUTH);
    if (res.status === 401) { localStorage.clear(); window.location.href='/login'; return; }
    if (!res.ok) {
      document.getElementById('moduleList').innerHTML = `
        <div class="text-center py-5 text-secondary">
          <i class="bi bi-exclamation-circle fs-1 opacity-50 d-block mb-3"></i>
          <p class="mb-0">Could not load training modules. Make sure your driver profile is set up.</p>
        </div>`;
      return;
    }
    modules = await res.json();
    renderModules();
  } catch(e) {
    document.getElementById('moduleList').innerHTML = `<div class="text-center py-5 text-secondary">Failed to load modules.</div>`;
  }
}
load();
</script>
</body>
</html>
